<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
.info-container {
  display: flex;
  justify-content: center;
  align-items: center;    
  height: 100vh;
}

.info-box {
    border: 2.5px rgb(255, 255, 255) solid;
    height: 350px;
    width: 350px;
    margin: 10px;
}

.info-text-box {
   margin-left: 30px;
   margin-right: 30px;  
    
}

.info-toptitle {
    font-size: 16px;
    margin-bottom: 0px;
    margin-top: 40px;
}

.info-title {
    margin-top: 10px;
    margin-bottom: 0px;
    font-size: 20px;
}


.info-subtitle {
    font-size: 19px;
    font-weight: normal;
    margin-bottom: 0px;
    margin-top: 10px;
}

.info-text {
    color: rgb(255, 255, 255);
}

body {
    background-color: rgb(29, 29, 29);
    font-family: "Inconsolata", monospace;
}


.inconsolata-normal {
  font-family: "Inconsolata", monospace;
  font-optical-sizing: auto;
  font-weight: 200;
  font-style: normal;
  font-variation-settings:
    "wdth" 100;
}

.footer-text {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%); 
    white-space: nowrap; 
    color: rgb(150, 150, 150);
    font-size: 12px;
}


    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
    <title>Internal Error</title>
</head>
<body>
  <div class="info-container">
    <div class="info-box">
      <div class="info-text-box">
        <h4 class="info-text info-toptitle">Alecks Web Gateway</h4>
        <h4 class="info-text info-title">Service Unavailable, we're likely already aware.</h4>
        <h2 class="info-text info-subtitle">This is caused by ongoing maintenance or outages on our end, <a class="info-text info-subtitle" href="https://status.alecks.dev" target="_blank">view live service status</a> for details.</h2>
        <h4 class="info-text info-subtitle">If this is a proxied service, our network is unable to reach the remote server.</h4>
      </div>
    </div>
  </div>

  <div class="footer-text">
    © 2026 Alecks Cloud
  </div>
</body>
</html>
